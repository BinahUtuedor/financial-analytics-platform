version: 2

models:

  - name: stg_stock_prices
    description: "Cleaned and deduplicated daily stock prices."

    columns:

      - name: symbol
        tests:
          - not_null

      - name: trading_date
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - symbol
              - trading_date

  - name: stg_company_profiles
    description: "Cleaned and deduplicated company profile data."

    columns:

      - name: ticker
        tests:
          - not_null

          - unique